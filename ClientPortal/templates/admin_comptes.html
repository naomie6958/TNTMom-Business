{% extends "base.html" %}
{% block title %}Comptes internes{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">🔑 <span>Comptes</span> internes</h1>
    </div>
</div>

<div class="card" style="margin-bottom: 1.5rem;">
    <h2 style="margin-top: 0; font-size: 1rem;">Créer un compte</h2>
    <form method="POST" action="/admin/comptes/creer"
          style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr auto; gap: 0.75rem; align-items: end;">
        <div>
            <label for="creer-name" style="display:block; font-size:0.75rem; color:var(--muted); margin-bottom:0.3rem;">Nom</label>
            <input type="text" id="creer-name" name="name" required style="width:100%;">
        </div>
        <div>
            <label for="creer-username" style="display:block; font-size:0.75rem; color:var(--muted); margin-bottom:0.3rem;">Identifiant</label>
            <input type="text" id="creer-username" name="username" required style="width:100%;">
        </div>
        <div>
            <label for="creer-role" style="display:block; font-size:0.75rem; color:var(--muted); margin-bottom:0.3rem;">Rôle</label>
            <select id="creer-role" name="role" style="width:100%;">
                <option value="staff">staff</option>
                <option value="admin">admin</option>
            </select>
        </div>
        <div>
            <label for="creer-password" style="display:block; font-size:0.75rem; color:var(--muted); margin-bottom:0.3rem;">Mot de passe initial</label>
            <input type="password" id="creer-password" name="password" required minlength="8" style="width:100%;">
        </div>
        <button type="submit" class="btn btn-primary btn-sm">Créer</button>
    </form>
</div>

<div class="card">
    <div class="comptes-table-wrap">
        <table class="client-table">
            <thead>
                <tr>
                    <th style="width: 18%;">Nom</th>
                    <th style="width: 18%;">Identifiant</th>
                    <th style="width: 14%;">Rôle</th>
                    <th style="width: 50%;">Nouveau mot de passe</th>
                </tr>
            </thead>
            <tbody>
                {% for compte in comptes %}
                <tr>
                    <td>{{ compte.name }}</td>
                    <td>{{ compte.username }}</td>
                    <td><span class="badge badge-{{ compte.role }}">{{ compte.role }}</span></td>
                    <td>
                        <form method="POST" action="/admin/comptes/{{ compte.id }}/reset-password"
                              onsubmit="return confirm('Réinitialiser le mot de passe de {{ compte.name }} ?');"
                              style="display:flex; gap:0.75rem; align-items:center;">
                            <input type="password" name="nouveau_mot_de_passe" placeholder="Nouveau mot de passe" required minlength="8" style="flex:1; max-width: 320px;">
                            <button type="submit" class="btn btn-secondary btn-sm">Réinitialiser</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
