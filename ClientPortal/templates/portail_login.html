<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portail Client — TNTMom</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.svg') }}" type="image/svg+xml">
</head>
<body>

{# Page standalone — pas de sidebar admin, layout centré identique à login.html #}
<div class="login-page">
    <div class="login-card">

        <div class="login-logo" style="text-align:center;">
            <span class="gold-title">TNT</span><span class="gold-title gold-mom">Mom</span>
        </div>
        <div class="login-sub">PORTAIL CLIENT</div>

        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/portail/login">
            <div class="form-group">
                <label for="email">Courriel</label>
                <input type="email" id="email" name="email"
                       autocomplete="email" autofocus required>
            </div>
            <div class="form-group" style="margin-bottom: 0.8rem;">
                <label for="password">Mot de passe</label>
                <div style="position: relative;">
                    <input type="password" id="password" name="password"
                           autocomplete="current-password" required
                           style="padding-right: 2.8rem;">
                    <button type="button" onclick="togglePassword('password', this)"
                            style="position: absolute; right: 0.7rem; top: 50%; transform: translateY(-50%);
                                   background: none; border: none; cursor: pointer;
                                   color: var(--muted); font-size: 1rem; padding: 0;">
                        👁
                    </button>
                </div>
            </div>
            <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.4rem;">
                <input type="checkbox" id="remember" style="accent-color: var(--accent);">
                <label for="remember" style="font-size: 0.8rem; color: var(--muted); cursor: pointer;">
                    Se souvenir de moi
                </label>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">
                Se connecter →
            </button>
        </form>

        <div style="text-align:center; margin-top:1.5rem; font-size:0.75rem; color:var(--muted);">
            Admin ?
            <a href="/login" style="color:var(--accent2); margin-left:0.3rem;">
                Interface admin →
            </a>
        </div>

    </div>
</div>

<script>
    function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        const showing = input.type === 'text';
        input.type = showing ? 'password' : 'text';
        btn.textContent = showing ? '👁' : '🙈';
    }

    const urlEmail = new URLSearchParams(window.location.search).get('email');
    const saved = localStorage.getItem('portail_email');
    if (urlEmail) {
        document.getElementById('email').value = urlEmail;
    } else if (saved) {
        document.getElementById('email').value = saved;
        document.getElementById('remember').checked = true;
    }

    document.querySelector('form').addEventListener('submit', () => {
        const email = document.getElementById('email').value;
        const remember = document.getElementById('remember').checked;
        if (remember) {
            localStorage.setItem('portail_email', email);
        } else {
            localStorage.removeItem('portail_email');
        }
    });
</script>
</body>
</html>
