{% extends "base.html" %}

{% block title %}Portail Client{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <h1 class ="page-title" style="margin-bottom: 0.3rem;">Portail Client</h1>
    <p class="text-muted" style="margin-bottom: 2rem; font-size: 0.85rem;">
        Connecte-toi pour voir l'avancement de tes projets.
    </p>

    {% if error %}
        <div class="alert-error" style="margin-bottom: 1rem;">{{ error }}</div>
    {% endif %}

    <form method="POST" class="card" style="padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem;">
        <div class="form-group">
            <label>Courriel</label>
            <input type="email" id="email" name="email" required autofocus>
        </div>
        <div class="form-group">
            <label>Mot de passe</label>
            <div style="position: relative;">
                <input type="password" id="password" name="password" required
                       style="padding-right: 2.8rem;">
                <button type="button" onclick="togglePassword('password', this)"
                        style="position: absolute; right: 0.7rem; top: 50%; transform: translateY(-50%);
                               background: none; border: none; cursor: pointer;
                               color: var(--muted); font-size: 1rem; padding: 0;">
                    👁
                </button>
            </div>
        </div>
        <div style="display: flex; align-items: center; gap: 0.5rem;">
            <input type="checkbox" id="remember" style="accent-color: var(--magenta);">
            <label for="remember" style="font-size: 0.8rem; color: var(--muted); cursor: pointer;">
                Se souvenir de moi
            </label>
        </div>
        <button type="submit" class="btn btn-primary">Se connecter</button>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        const showing = input.type === 'text';
        input.type = showing ? 'password' : 'text';
        btn.textContent = showing ? '👁' : '🙈';
    }

    // Pré-remplit l'email si mémorisé — clé différente de l'admin pour ne pas mélanger
    const saved = localStorage.getItem('portail_email');
    if (saved) {
        document.getElementById('email').value = saved;
        document.getElementById('remember').checked = true;
    }

    document.querySelector('form').addEventListener('submit', () => {
        const email = document.getElementById('email').value;
        const remember = document.getElementById('remember').checked;
        if (remember) {
            localStorage.setItem('portail_email', email);
        } else {
            localStorage.removeItem('portail_email');
        }
    });
</script>
{% endblock %}
