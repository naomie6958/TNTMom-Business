<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AJUN. · Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Unbounded:wght@300;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --neon-pink: #ff2d78;
    --neon-purple: #b94fff;
    --neon-cyan: #00f5d4;
    --text: #e8e8f0;
    --muted: #555568;
    --glow-pink: 0 0 20px rgba(255,45,120,0.5), 0 0 60px rgba(255,45,120,0.2);
    --glow-cyan: 0 0 20px rgba(0,245,212,0.5), 0 0 60px rgba(0,245,212,0.2);
    --glow-purple: 0 0 20px rgba(185,79,255,0.5);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(185,79,255,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(255,45,120,0.07) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  .container { width: 100%; max-width: 460px; position: relative; z-index: 1; }
  header { text-align: center; margin-bottom: 2rem; }
  .title {
    font-family: 'Unbounded', sans-serif;
    font-weight: 900;
    font-size: clamp(2rem, 7vw, 2.8rem);
    background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.2em; text-transform: uppercase; margin-top: 0.4rem; }
  .counter-card {
    background: var(--surface);
    border: 1px solid rgba(255,45,120,0.2);
    border-radius: 20px;
    padding: 2rem 1.5rem 1.5rem;
    text-align: center;
    margin-bottom: 1.25rem;
    position: relative;
    overflow: hidden;
  }
  .counter-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--neon-pink), var(--neon-purple), transparent);
  }
  .days-number {
    font-family: 'Unbounded', sans-serif;
    font-weight: 900;
    font-size: clamp(4.5rem, 22vw, 7.5rem);
    line-height: 1;
    color: var(--neon-pink);
    text-shadow: var(--glow-pink);
  }
  .days-label { font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); margin-top: 0.3rem; }
  .streak-status { font-size: 0.7rem; margin-top: 0.8rem; color: var(--muted); }
  .streak-status .ok   { color: var(--neon-cyan); text-shadow: var(--glow-cyan); }
  .streak-status .warn { color: #ffaa00; }
  .streak-status .dead { color: var(--neon-pink); }
  .check-btn {
    width: 100%;
    padding: 1.3rem;
    border-radius: 16px;
    border: 2px solid rgba(0,245,212,0.4);
    background: rgba(0,245,212,0.05);
    color: var(--neon-cyan);
    font-family: 'Unbounded', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-bottom: 1.25rem;
  }
  .check-btn:hover:not(:disabled) {
    background: rgba(0,245,212,0.1);
    border-color: var(--neon-cyan);
    box-shadow: var(--glow-cyan);
    transform: translateY(-1px);
  }
  .check-btn:disabled {
    border-color: rgba(0,245,212,0.15);
    color: rgba(0,245,212,0.35);
    cursor: not-allowed;
    background: rgba(0,245,212,0.02);
  }
  .message-card {
    background: var(--surface);
    border: 1px solid rgba(185,79,255,0.2);
    border-radius: 12px;
    padding: 1.1rem 1.4rem;
    margin-bottom: 1.25rem;
    font-size: 0.78rem;
    line-height: 1.7;
    color: #aaaacc;
    min-height: 3.5rem;
  }
  .message-card::before { content: '// '; color: var(--neon-purple); font-weight: 700; text-shadow: var(--glow-purple); }
  .streak-section { margin-bottom: 1.25rem; }
  .streak-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
  .section-label { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
  .streak-next-label { font-size: 0.65rem; color: var(--muted); }
  .streak-next-label span { color: var(--neon-purple); }
  .streak-bar-bg { height: 5px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; }
  .streak-bar-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, var(--neon-pink), var(--neon-purple));
    box-shadow: 0 0 10px rgba(255,45,120,0.4);
    transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  }
  .milestones { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem; margin-bottom: 1.25rem; }
  .milestone {
    background: var(--surface); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px; padding: 0.9rem 0.4rem; text-align: center; transition: all 0.3s ease;
  }
  .milestone.reached { border-color: rgba(0,245,212,0.3); background: rgba(0,245,212,0.04); }
  .milestone.reached .m-days { color: var(--neon-cyan); text-shadow: var(--glow-cyan); }
  .milestone.next { border-color: rgba(185,79,255,0.3); background: rgba(185,79,255,0.04); }
  .milestone.next .m-days { color: var(--neon-purple); text-shadow: var(--glow-purple); }
  .m-days { font-family: 'Unbounded', sans-serif; font-weight: 700; font-size: 1.3rem; color: var(--muted); transition: all 0.3s ease; }
  .m-label { font-size: 0.55rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-top: 0.2rem; }
  .m-check { font-size: 0.85rem; margin-top: 0.2rem; opacity: 0; transition: opacity 0.3s; }
  .milestone.reached .m-check { opacity: 1; }
  .calendar-section {
    background: var(--surface); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px; padding: 1.25rem; margin-bottom: 1.25rem;
  }
  .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .cal-nav {
    background: none; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
    color: var(--muted); font-size: 0.8rem; padding: 0.25rem 0.7rem; cursor: pointer; transition: all 0.2s;
  }
  .cal-nav:hover:not(:disabled) { border-color: var(--neon-purple); color: var(--neon-purple); }
  .cal-nav:disabled { opacity: 0.2; cursor: default; }
  .cal-month-label { font-family: 'Unbounded', sans-serif; font-size: 0.75rem; font-weight: 700; }
  .cal-days-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 4px; }
  .cal-day-name { text-align: center; font-size: 0.55rem; color: var(--muted); padding: 0.2rem 0; text-transform: uppercase; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-cell {
    aspect-ratio: 1; border-radius: 6px; display: flex;
    align-items: center; justify-content: center; font-size: 0.62rem; transition: all 0.2s;
  }
  .cal-cell.empty { background: transparent; }
  .cal-cell.future { background: rgba(255,255,255,0.02); color: rgba(255,255,255,0.1); }
  .cal-cell.past-miss { background: rgba(255,45,120,0.07); color: rgba(255,45,120,0.3); border: 1px solid rgba(255,45,120,0.1); }
  .cal-cell.checked { background: rgba(0,245,212,0.12); color: var(--neon-cyan); border: 1px solid rgba(0,245,212,0.25); font-weight: 700; }
  .cal-cell.today-checked { background: rgba(0,245,212,0.18); border: 1px solid rgba(0,245,212,0.5); color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0,245,212,0.2); font-weight: 700; }
  .cal-cell.today-miss { background: rgba(185,79,255,0.1); border: 1px solid rgba(185,79,255,0.4); color: var(--neon-purple); font-weight: 700; }
  .btn-reset {
    width: 100%; background: transparent; border: 1px solid rgba(255,45,120,0.2);
    border-radius: 8px; color: rgba(255,45,120,0.4); font-family: 'Space Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase;
    padding: 0.65rem; cursor: pointer; transition: all 0.2s ease;
  }
  .btn-reset:hover { background: rgba(255,45,120,0.06); border-color: var(--neon-pink); color: var(--neon-pink); }
  @keyframes float-up {
    0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
    100% { transform: translateY(-140px) rotate(480deg) scale(0.3); opacity: 0; }
  }
  .particle { position: fixed; width: 8px; height: 8px; border-radius: 2px; pointer-events: none; animation: float-up 1.1s ease-out forwards; z-index: 999; }
  @keyframes pulse-glow {
    0%,100% { text-shadow: var(--glow-pink); }
    50% { text-shadow: 0 0 50px rgba(255,45,120,0.9), 0 0 100px rgba(255,45,120,0.5); }
  }
  .days-number.pop { animation: pulse-glow 0.5s ease-in-out 3; }
  @keyframes check-bounce {
    0% { transform: scale(1); } 40% { transform: scale(0.93); }
    70% { transform: scale(1.04); } 100% { transform: scale(1); }
  }
  .check-btn.bounce { animation: check-bounce 0.35s ease; }
  footer { text-align: center; margin-top: 2rem; font-size: 0.55rem; color: var(--muted); letter-spacing: 0.15em; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="title">AJUN.</div>
    <div class="subtitle">Tracker de sobriété · speed</div>
  </header>
  <div class="counter-card">
    <div class="days-number" id="daysCount">0</div>
    <div class="days-label">jours de streak</div>
    <div class="streak-status" id="streakStatus">—</div>
  </div>
  <button class="check-btn" id="checkBtn" onclick="checkToday()">◯ &nbsp; Cocher aujourd'hui</button>
  <div class="message-card" id="messageCard">Chargement...</div>
  <div class="streak-section">
    <div class="streak-header">
      <div class="section-label">prochain milestone</div>
      <div class="streak-next-label" id="nextMilestoneLabel">—</div>
    </div>
    <div class="streak-bar-bg"><div class="streak-bar-fill" id="streakBar" style="width:0%"></div></div>
  </div>
  <div class="milestones">
    <div class="milestone" data-days="7"><div class="m-days">7</div><div class="m-label">jours</div><div class="m-check">✓</div></div>
    <div class="milestone" data-days="21"><div class="m-days">21</div><div class="m-label">jours</div><div class="m-check">✓</div></div>
    <div class="milestone" data-days="30"><div class="m-days">30</div><div class="m-label">jours</div><div class="m-check">✓</div></div>
    <div class="milestone" data-days="60"><div class="m-days">60</div><div class="m-label">jours</div><div class="m-check">✓</div></div>
    <div class="milestone" data-days="90"><div class="m-days">90</div><div class="m-label">jours</div><div class="m-check">✓</div></div>
    <div class="milestone" data-days="180"><div class="m-days">180</div><div class="m-label">jours</div><div class="m-check">✓</div></div>
  </div>
  <div class="calendar-section">
    <div class="cal-header">
      <button class="cal-nav" id="calPrev" onclick="calNav(-1)">←</button>
      <div class="cal-month-label" id="calMonthLabel">—</div>
      <button class="cal-nav" id="calNext" onclick="calNav(1)">→</button>
    </div>
    <div class="cal-days-header">
      <div class="cal-day-name">Di</div><div class="cal-day-name">Lu</div>
      <div class="cal-day-name">Ma</div><div class="cal-day-name">Me</div>
      <div class="cal-day-name">Je</div><div class="cal-day-name">Ve</div>
      <div class="cal-day-name">Sa</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
  <button class="btn-reset" onclick="resetAll()">↺ &nbsp; Tout réinitialiser</button>
</div>
<footer>built for the nerdy trapmom 🖤</footer>

<script>
const MESSAGES = {
  0:"Coche ton premier jour pour démarrer.",
  1:"Jour 1. Pas de magie, juste toi.",
  2:"48h. Ton cerveau commence déjà à recâbler.",
  3:"3 jours. Le pire pic de craving, c'est souvent derrière toi.",
  4:"4 jours. Chaque heure qui passe, ton système nerveux respire un peu plus.",
  5:"5 jours. T'as choisi ça cinq fois de suite. C'est pas rien.",
  6:"6 jours. Demain c'est une semaine. T'es à une nuit de là.",
  7:"🔥 7 jours. Une semaine complète. First milestone, for real.",
  8:"8 jours. Le momentum, ça s'accumule silencieusement.",
  9:"9 jours. Encore un jour et c'est les double chiffres.",
  10:"10 jours. Double chiffres. Regarde ça.",
  11:"11 jours. Ton cerveau produit plus de dopamine naturellement. Lentement, mais sûrement.",
  12:"12 jours. La fatigue de début commence à lever. Ton énergie revient à toi.",
  13:"13 jours. Demain c'est 2 semaines. Dors bien.",
  14:"14 jours. 2 semaines. Ton sommeil devrait commencer à s'améliorer pour vrai.",
  15:"15 jours. La moitié du chemin vers le mois. T'es exactement là où tu dois être.",
  16:"16 jours. Chaque journée propre c'est une preuve que t'es capable. T'en as 16.",
  17:"17 jours. La clarté mentale revient en patches. Profites-en.",
  18:"18 jours. T'as traversé des affaires cette semaine. Et t'es encore là.",
  19:"19 jours. Deux jours de plus pis c'est 3 semaines. Go.",
  20:"20 jours. Vingt. Compte-les.",
  21:"🔥 21 jours. La durée d'un programme résidentiel complet. T'as fait ça, ajun.",
  22:"22 jours. Le rewiring neurologique commence à devenir mesurable. Scientifiquement.",
  23:"23 jours. T'as survécu à des journées difficiles sans. Ça, c'est de la donnée.",
  24:"24 jours. 6 jours du mois. Le compteur avance même quand toi tu stales.",
  25:"25 jours. Un quart de 100. Ça s'en vient vite.",
  26:"26 jours. T'as bâti quelque chose ce mois-ci. Une fondation.",
  27:"27 jours. 3 jours du mois. Le finish line est visible.",
  28:"28 jours. 4 semaines exactement. Ton corps s'est adapté plus que tu penses.",
  29:"29 jours. Demain c'est le mois. Dors, mange, bois de l'eau.",
  30:"🔥 30 jours. Un mois complet. C'est pas rien, c'est énorme.",
  45:"45 jours. La moitié du chemin vers 90. T'es dans le vrai travail.",
  60:"🔥 60 jours. Les nouvelles habitudes neurales s'ancrent pour de vrai.",
  75:"75 jours. 15 jours du 90. Stretch final.",
  90:"🔥 90 jours. Le benchmark clinique. T'es dedans.",
  100:"100 jours. Triple chiffres. Ok.",
  120:"120 jours. 4 mois. Ton nouveau normal commence à ressembler à... normal.",
  150:"150 jours. 5 mois. Tu t'en souviens encore pourquoi t'as commencé?",
  180:"🔥 6 mois. Là on parle d'un vrai nouveau baseline. Pour de vrai.",
  270:"270 jours. 9 mois. T'es à 3 mois d'un an.",
  300:"300 jours. Trois cents. C'est presque choquant.",
  365:"🔥 UN AN. Nao. Un ostie d'an."
};

const MILESTONES_LIST = [7,21,30,60,90,180,365];

// ─── HELPERS ────────────────────────────────────────────────
function toDateStr(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}
function todayStr() { return toDateStr(new Date()); }

// ─── ÉTAT EN MÉMOIRE — seedé depuis le 10 avril 2026 ────────
var _checked = (function() {
  var arr = [];
  var cur = new Date(2026, 3, 10); // 10 avril 2026
  var today = new Date(); today.setHours(0,0,0,0);
  while (cur <= today) {
    arr.push(toDateStr(new Date(cur)));
    cur.setDate(cur.getDate()+1);
  }
  return arr;
})();

function getChecked() { return _checked; }
function saveChecked(arr) { _checked = arr; }
function isTodayChecked() { return _checked.indexOf(todayStr()) !== -1; }

function calcStreak(checked) {
  if (!checked.length) return 0;
  var set = {};
  checked.forEach(function(d){ set[d] = true; });
  var d = new Date(); d.setHours(0,0,0,0);
  if (!set[todayStr()]) d.setDate(d.getDate()-1);
  var streak = 0;
  while (set[toDateStr(d)]) {
    streak++;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

function getMessage(days) {
  var keys = Object.keys(MESSAGES).map(Number).sort(function(a,b){return b-a;});
  for (var i=0; i<keys.length; i++) { if (days >= keys[i]) return MESSAGES[keys[i]]; }
  return MESSAGES[0];
}

// ─── PARTICLES ──────────────────────────────────────────────
function spawnParticles(count) {
  var colors = ['#ff2d78','#b94fff','#00f5d4','#ffaa00'];
  for (var i=0; i<count; i++) {
    var p = document.createElement('div');
    p.className = 'particle';
    p.style.left = (15+Math.random()*70)+'vw';
    p.style.top = '45vh';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDelay = (Math.random()*0.4)+'s';
    p.style.borderRadius = Math.random()>0.5?'50%':'2px';
    document.body.appendChild(p);
    setTimeout(function(el){ return function(){ el.remove(); }; }(p), 1500);
  }
}

// ─── CALENDAR ───────────────────────────────────────────────
var calViewYear, calViewMonth;

function renderCalendar() {
  var now = new Date();
  if (calViewYear === undefined) { calViewYear = now.getFullYear(); calViewMonth = now.getMonth(); }
  var checked = {};
  getChecked().forEach(function(d){ checked[d]=true; });
  var t = todayStr();
  var months = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  document.getElementById('calMonthLabel').textContent = months[calViewMonth]+' '+calViewYear;

  var firstDay = new Date(calViewYear, calViewMonth, 1).getDay();
  var daysInMonth = new Date(calViewYear, calViewMonth+1, 0).getDate();
  var today = new Date(); today.setHours(0,0,0,0);
  var grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  for (var i=0; i<firstDay; i++) {
    var e = document.createElement('div'); e.className='cal-cell empty'; grid.appendChild(e);
  }
  for (var day=1; day<=daysInMonth; day++) {
    var cell = document.createElement('div');
    cell.className = 'cal-cell';
    var ds = calViewYear+'-'+String(calViewMonth+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    var cellDate = new Date(calViewYear, calViewMonth, day); cellDate.setHours(0,0,0,0);
    var isToday = ds===t;
    var isChecked = !!checked[ds];
    if (cellDate > today) { cell.classList.add('future'); cell.textContent=day; }
    else if (isToday) { cell.classList.add(isChecked?'today-checked':'today-miss'); cell.textContent=isChecked?'✓':day; }
    else { cell.classList.add(isChecked?'checked':'past-miss'); cell.textContent=isChecked?'✓':day; }
    grid.appendChild(cell);
  }
  var isCurrentMonth = calViewYear===now.getFullYear() && calViewMonth===now.getMonth();
  document.getElementById('calNext').disabled = isCurrentMonth;
}

function calNav(dir) {
  calViewMonth += dir;
  if (calViewMonth>11){calViewMonth=0;calViewYear++;}
  if (calViewMonth<0){calViewMonth=11;calViewYear--;}
  renderCalendar();
}

// ─── UPDATE ─────────────────────────────────────────────────
function update() {
  var checked = getChecked();
  var streak = calcStreak(checked);
  var todayDone = isTodayChecked();

  document.getElementById('daysCount').textContent = streak;

  var statusEl = document.getElementById('streakStatus');
  if (todayDone) {
    statusEl.innerHTML = '<span class="ok">✓ coché aujourd\'hui</span>';
  } else {
    var yest = new Date(); yest.setDate(yest.getDate()-1);
    var yestStr = toDateStr(yest);
    if (checked.indexOf(yestStr) !== -1) {
      statusEl.innerHTML = '<span class="warn">⚠ coche aujourd\'hui pour garder le streak</span>';
    } else if (streak === 0) {
      statusEl.innerHTML = '<span class="warn">Coche aujourd\'hui pour démarrer 🌞</span>';
    } else {
      statusEl.innerHTML = '<span class="dead">streak brisé — recommence aujourd\'hui</span>';
    }
  }

  var btn = document.getElementById('checkBtn');
  if (todayDone) {
    btn.textContent = '✓  Journée cochée';
    btn.disabled = true;
  } else {
    btn.innerHTML = '◯ &nbsp; Cocher aujourd\'hui';
    btn.disabled = false;
  }

  document.getElementById('messageCard').textContent = getMessage(streak);

  var next = null;
  for (var i=0; i<MILESTONES_LIST.length; i++) { if (MILESTONES_LIST[i]>streak){next=MILESTONES_LIST[i];break;} }
  document.querySelectorAll('.milestone').forEach(function(m) {
    var d = parseInt(m.dataset.days);
    m.classList.remove('reached','next');
    if (streak>=d) m.classList.add('reached');
    else if (d===next) m.classList.add('next');
  });

  if (next) {
    var idx = MILESTONES_LIST.indexOf(next);
    var prev = idx>0?MILESTONES_LIST[idx-1]:0;
    var pct = ((streak-prev)/(next-prev))*100;
    document.getElementById('streakBar').style.width = Math.min(100,pct)+'%';
    document.getElementById('nextMilestoneLabel').innerHTML = '<span>'+next+'j</span> — encore '+(next-streak)+'j';
  } else if (streak>0) {
    document.getElementById('streakBar').style.width='100%';
    document.getElementById('nextMilestoneLabel').innerHTML='<span>all milestones 🔥</span>';
  } else {
    document.getElementById('streakBar').style.width='0%';
    document.getElementById('nextMilestoneLabel').innerHTML='—';
  }

  renderCalendar();
}

// ─── CHECK ──────────────────────────────────────────────────
function checkToday() {
  if (isTodayChecked()) return;
  var checked = getChecked().slice();
  checked.push(todayStr());
  saveChecked(checked);
  var newStreak = calcStreak(checked);

  var btn = document.getElementById('checkBtn');
  btn.classList.add('bounce');
  setTimeout(function(){ btn.classList.remove('bounce'); }, 400);

  if (MILESTONES_LIST.indexOf(newStreak)!==-1 || newStreak===1) {
    spawnParticles(20);
    var el = document.getElementById('daysCount');
    el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
    setTimeout(function(){ el.classList.remove('pop'); }, 2000);
  } else {
    spawnParticles(8);
  }
  update();
}

// ─── RESET ──────────────────────────────────────────────────
function resetAll() {
  if (confirm('Réinitialiser tout? Toutes tes coches seront effacées.')) {
    saveChecked([]);
    calViewYear = new Date().getFullYear();
    calViewMonth = new Date().getMonth();
    update();
  }
}

update();
</script>
</body>
</html>
