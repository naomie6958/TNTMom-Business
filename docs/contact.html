<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Contacte The Nerdy Trap Mom pour ton prochain projet web. Une idée ? Un projet ? Un message ?">
        <meta property="og:title" content="Contact — The Nerdy Trap Mom">
        <meta property="og:description" content="Une idée ? Un projet ? Un message ? Parlons-en.">
        <meta property="og:image" content="https://tntm.ca/images/og-contact.png">
        <meta property="og:url" content="https://tntm.ca/contact.html">
        <meta property="og:type" content="website">
        <meta name="twitter:card" content="summary_large_image">
        <link rel="canonical" href="https://tntm.ca/contact.html">
        <title>TNTM — Contact</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nabla&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="css/style.css">
        <link rel="icon" href="images/tntmom-icone-dark-magenta.svg" type="image/svg+xml">
        <link rel="apple-touch-icon" href="images/tntmom-icone-dark-magenta.svg">
        <script src="js/components.js"></script>
    </head>
    <body>
        <tntm-header></tntm-header>        <main>
            <section id="hero" class="page-hero contact-hero">
                <p id="hero-tagline"><span class="hero-line1">Contact</span></p>
                <p id="contact-sub">Une idée ? Un projet ? Un message ?</p>
            </section>
            <section id="contact-section">
                <form id="contact-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="nom">Nom</label>
                            <input type="text" id="nom" name="nom" placeholder="Ton nom" required>
                        </div>
                        <div class="form-group">
                            <label for="telephone">Téléphone</label>
                            <input type="tel" id="telephone" name="telephone" placeholder="(123) 456-7890">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="courriel">Courriel</label>
                        <input type="email" id="courriel" name="courriel" placeholder="ton@courriel.com" required>
                    </div>
                    <fieldset class="form-group">
                        <legend>Comment préférez-vous être recontacté?</legend>
                        <div class="radio-group">
                            <label class="radio-option"><input type="radio" name="recontact" value="Texto" required /> Texto</label>
                            <label class="radio-option"><input type="radio" name="recontact" value="Téléphone" required /> Téléphone</label>
                            <label class="radio-option"><input type="radio" name="recontact" value="Courriel" required /> Courriel</label>
                        </div>
                    </fieldset>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="type_projet">Type de projet</label>
                            <select id="type_projet" name="type_projet" required>
                                <option value="" disabled selected>Sélectionne un type</option>
                                <option value="Site web">Site web</option>
                                <option value="Application web">Application web</option>
                                <option value="Autre">Autre</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="budget">Budget (optionnel)</label>
                            <select id="budget" name="budget">
                                <option value="" disabled selected>Pas encore d'idée</option>
                                <option value="Moins de 1000$">Moins de 1000$</option>
                                <option value="1000$ - 2000$">1000$ - 2000$</option>
                                <option value="2000$ - 4000$">2000$ - 4000$</option>
                                <option value="4000$+">4000$ et plus</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="projet">Décris moi ton projet</label>
                        <textarea id="projet" name="projet" rows="4" placeholder="Décris ton projet..." required></textarea>
                    </div>
                    <button type="submit" class="btn-submit" id="contact-submit">Envoyer</button>
                    <div id="contact-feedback" style="display:none; margin-top:1rem; font-size:0.9rem;"></div>
                </form>
                <script>
                document.getElementById('contact-form').addEventListener('submit', function(e) {
                    e.preventDefault();
                    const btn = document.getElementById('contact-submit');
                    btn.classList.add('loading');
                    btn.disabled = true;
                    const data = {
                        nom:         document.getElementById('nom').value,
                        telephone:   document.getElementById('telephone').value,
                        email:       document.getElementById('courriel').value,
                        recontact:   document.querySelector('input[name="recontact"]:checked').value,
                        typeProjet:  document.getElementById('type_projet').value,
                        budget:      document.getElementById('budget').value,
                        message:     document.getElementById('projet').value
                    };
                    fetch('https://portail.tntm.ca/api/public/contact', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    })
                    .then(r => r.json())
                    .then(() => {
                        document.getElementById('contact-form').reset();
                        const fb = document.getElementById('contact-feedback');
                        fb.style.display = 'block';
                        fb.style.color = '#3ecf8e';
                        fb.textContent = '✓ Message envoyé ! Naomie te revient sous peu.';
                        btn.style.display = 'none';
                    })
                    .catch(() => {
                        const fb = document.getElementById('contact-feedback');
                        fb.style.display = 'block';
                        fb.style.color = '#f87171';
                        fb.textContent = 'Erreur — écris directement à naomiemt@tntm.ca';
                        btn.classList.remove('loading');
                        btn.disabled = false;
                    });
                });
                </script>
            </section>
        </main>
        <tntm-footer></tntm-footer>    <script src="js/script.js"></script>
    </body>
</html>
