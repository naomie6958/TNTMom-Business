<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Contacte The Nerdy Trap Mom pour ton prochain projet web. Une idée ? Un projet ? Un message ?">
        <meta property="og:title" content="Contact — The Nerdy Trap Mom">
        <meta property="og:description" content="Une idée ? Un projet ? Un message ? Parlons-en.">
        <meta property="og:image" content="https://tntm.ca/images/tntmom-banner.png">
        <meta property="og:url" content="https://tntm.ca/contact.html">
        <meta property="og:type" content="website">
        <meta name="twitter:card" content="summary_large_image">
        <title>TNTM — Contact</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nabla&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="css/style.css">
        <link rel="icon" href="images/tntmom-icone-dark-magenta.svg" type="image/svg+xml">
    </head>
    <body>
        <div class="sticky-header">
        <header>
            <div id="header-brand">
                <a href="index.html" class="header-banner-link">
                    <div class="header-banner">
                        <span class="hb-tnt">TNT</span>
                        <div class="hb-sep"></div>
                        <div class="hb-right">
                            <span class="hb-label">Développeuse</span>
                            <span class="hb-mom">MOM</span>
                        </div>
                    </div>
                </a>
            </div>
            <nav>
                <a href="index.html">Accueil</a>
                <a href="index.html#galerie">Mes projets</a>
                <a href="process.html">Comment je travaille</a>
                <a href="about.html">À propos</a>
                <a href="contact.html">Contact</a>
                <a href="https://tntmom.pythonanywhere.com/portail/login" target="_blank" class="nav-portail">Portail client →</a>
            </nav>
            <button id="menu-toggle">☰</button>
        </header>
        </div>
        <main>
            <section id="hero" class="page-hero contact-hero">
                <p id="hero-tagline"><span class="hero-line1">Contact</span></p>
                <p id="contact-sub">Une idée ? Un projet ? Un message ?</p>
            </section>
            <section id="contact-section">
                <form id="contact-form">
                    <div class="form-group">
                        <label for="nom">Nom</label>
                        <input type="text" id="nom" name="nom" placeholder="Ton nom" required>
                    </div>
                    <div class="form-group">
                        <label for="courriel">Courriel</label>
                        <input type="email" id="courriel" name="courriel" placeholder="ton@courriel.com" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="6" placeholder="Ton message..." required></textarea>
                    </div>
                    <button type="submit" class="btn-submit" id="contact-submit">Envoyer</button>
                    <div id="contact-feedback" style="display:none; margin-top:1rem; font-size:0.9rem;"></div>
                </form>
                <script>
                document.getElementById('contact-form').addEventListener('submit', function(e) {
                    e.preventDefault();
                    const btn = document.getElementById('contact-submit');
                    btn.disabled = true;
                    btn.textContent = 'Envoi...';
                    const data = {
                        nom:     document.getElementById('nom').value,
                        email:   document.getElementById('courriel').value,
                        message: document.getElementById('message').value
                    };
                    fetch('https://tntmom.pythonanywhere.com/api/public/contact', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    })
                    .then(r => r.json())
                    .then(() => {
                        document.getElementById('contact-form').reset();
                        const fb = document.getElementById('contact-feedback');
                        fb.style.display = 'block';
                        fb.style.color = '#3ecf8e';
                        fb.textContent = '✓ Message envoyé ! Naomie te revient sous peu.';
                        btn.style.display = 'none';
                    })
                    .catch(() => {
                        const fb = document.getElementById('contact-feedback');
                        fb.style.display = 'block';
                        fb.style.color = '#f87171';
                        fb.textContent = 'Erreur — écris directement à naomiemt@tntm.ca';
                        btn.disabled = false;
                        btn.textContent = 'Envoyer';
                    });
                });
                </script>
            </section>
        </main>
        <footer>
            <div id="footer-brand">
                <img src="images/tntmom-favicon-bleu.svg" alt="TNTM" id="footer-favicon">
                <span>The Nerdy Trap Mom</span>
            </div>
            <a href="https://buymeacoffee.com/tntm" target="_blank" class="bmc-btn">☕ Buy me a coffee</a>
            <span id="footer-copy">© 2026 TNTM — Naomie McMahon Tanguay</span>
        </footer>
    <script src="js/script.js"></script>
    </body>
</html>
